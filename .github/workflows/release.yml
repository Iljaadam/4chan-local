# Publish to PyPI on a GitHub Release, via Trusted Publishing (OIDC) — no API token
# stored in the repo. One-time setup on PyPI (see README / the notes below) must
# match: owner Iljaadam, repo 4chan-local, workflow release.yml, environment pypi.
#
# To cut a release:
#   1. bump `version` in pyproject.toml, commit, push
#   2. create a GitHub Release with tag vX.Y.Z
#   -> this workflow builds the wheel+sdist and uploads them to PyPI.
name: release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
