name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import + CLI smoke
        run: |
          python -c "import fourchan_local.app, fourchan_local.cli, fourchan_local.poller, fourchan_local.media, fourchan_local.retention, fourchan_local.db"
          4cl --help
          # first-run bootstraps schema in a throwaway data dir
          FOURCHAN_DB="$RUNNER_TEMP/t.db" 4cl boards add g
          FOURCHAN_DB="$RUNNER_TEMP/t.db" 4cl status
      - name: Build wheel
        run: |
          pip install build
          python -m build
